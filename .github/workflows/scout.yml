name: Scout Gems

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]
    paths:
      - 'scout.js'
      - 'scout-queries.js'
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run eBay scout
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_CAMPAIGN_ID: ${{ secrets.EBAY_CAMPAIGN_ID }}
        run: node scout.js

      - name: Commit listings.json if changed
        run: |
          git config user.name "Gem Scouter Bot"
          git config user.email "github-actions@github.com"
          git add listings.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update listings $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
